<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:
      radial-gradient(55% 60% at 88% -10%, #ffd3b8 0%, rgba(255,211,184,0) 60%),
      radial-gradient(50% 55% at -8% 8%, #c2ece1 0%, rgba(194,236,225,0) 58%),
      #f7f4ef;
    color:#241f2b;font-family:"DM Sans",sans-serif;
    padding:72px 80px;display:flex;flex-direction:column;justify-content:space-between;
    -webkit-font-smoothing:antialiased;
  }
  .eyebrow{font-family:"Space Mono",monospace;font-size:22px;letter-spacing:.24em;text-transform:uppercase;color:#8b8395;display:flex;align-items:center;gap:14px}
  .ping{width:13px;height:13px;border-radius:50%;background:#12ab6d;box-shadow:0 0 20px 3px rgba(18,171,109,.45)}
  h1{font-family:"Syne",sans-serif;font-weight:800;letter-spacing:-.02em;font-size:146px;line-height:.92;margin:26px 0 20px;
     background:linear-gradient(96deg,#ff6a3d 0%,#c94dff 50%,#13b0a0 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:34px;color:#6d6676;max-width:20ch;line-height:1.3}
  .sub b{color:#241f2b;font-weight:600}
  .foot{display:flex;align-items:center;gap:20px}
  .chips{display:flex;gap:14px}
  .chip{font-family:"Space Mono",monospace;font-size:20px;font-weight:700;border-radius:999px;padding:10px 20px;color:#fff}
  .c1{background:#13a99a}.c2{background:#e8712f}.c3{background:#9b45f0}
  .url{margin-left:auto;font-family:"Space Mono",monospace;font-size:24px;color:#8b8395}
</style>
</head>
<body>
  <div>
    <div class="eyebrow"><span class="ping"></span> live ticket-tracker</div>
    <h1>Festival Radar</h1>
    <div class="sub">Vik's shortlist <b>intieme &amp; underground</b> festivals</div>
  </div>
  <div class="foot">
    <div class="chips">
      <span class="chip c1">voor de deur</span>
      <span class="chip c2">roadtrip</span>
      <span class="chip c3">bucketlist</span>
    </div>
    <span class="url">dehanos78.github.io/festival-radar</span>
  </div>
</body>
</html>
