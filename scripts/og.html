<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:
      radial-gradient(120% 90% at 82% -20%, #2f1d4d 0%, rgba(47,29,77,0) 55%),
      radial-gradient(90% 70% at -10% 10%, #1d2740 0%, rgba(29,39,64,0) 55%),
      #15101f;
    color:#f5f1fb;font-family:"DM Sans",sans-serif;
    padding:72px 80px;display:flex;flex-direction:column;justify-content:space-between;
    -webkit-font-smoothing:antialiased;
  }
  .eyebrow{font-family:"Space Mono",monospace;font-size:22px;letter-spacing:.24em;text-transform:uppercase;color:#948ab0;display:flex;align-items:center;gap:14px}
  .ping{width:13px;height:13px;border-radius:50%;background:#54e0a6;box-shadow:0 0 22px 4px rgba(84,224,166,.6)}
  h1{font-family:"Syne",sans-serif;font-weight:800;letter-spacing:-.02em;font-size:146px;line-height:.92;margin:26px 0 20px;
     background:linear-gradient(96deg,#fff 8%,#cdb6ff 52%,#7fe6d8 100%);-webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{font-size:34px;color:#bcafd8;max-width:20ch;line-height:1.3}
  .sub b{color:#f5f1fb;font-weight:600}
  .foot{display:flex;align-items:center;gap:20px}
  .chips{display:flex;gap:14px}
  .chip{font-family:"Space Mono",monospace;font-size:20px;color:#15101f;font-weight:700;border-radius:999px;padding:10px 20px}
  .c1{background:#5fd3c4}.c2{background:#f0915e}.c3{background:#c06bff}
  .url{margin-left:auto;font-family:"Space Mono",monospace;font-size:24px;color:#948ab0}
</style>
</head>
<body>
  <div>
    <div class="eyebrow"><span class="ping"></span> live ticket-tracker</div>
    <h1>Festival Radar</h1>
    <div class="sub">Vik's shortlist <b>intieme &amp; underground</b> festivals</div>
  </div>
  <div class="foot">
    <div class="chips">
      <span class="chip c1">voor de deur</span>
      <span class="chip c2">roadtrip</span>
      <span class="chip c3">bucketlist</span>
    </div>
    <span class="url">dehanos78.github.io/festival-radar</span>
  </div>
</body>
</html>
